<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beware of the Dog - Setup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="setup-page">

  <div id="loreOverlay" class="lore-overlay" aria-hidden="true">
    <div class="lore-shell">
      <div id="loreMosaic" class="lore-mosaic"></div>
  
      <div class="lore-panel">
        <div class="lore-kicker">The Duck Pond</div>
        <h1 id="loreTitle" class="lore-title">Cave Canem</h1>
        <div id="loreText" class="lore-text"></div>
  
        <div class="lore-footer">
          <div id="loreProgress" class="lore-progress">1 / 6</div>
          <div class="lore-actions">
            <button id="loreSkipBtn" class="btn btn-secondary" type="button">Skip</button>
            <button id="loreNextBtn" class="btn btn-primary" type="button">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="site-bg" aria-hidden="true"></div>

  <div class="page-shell">
    <header class="topbar">
      <h1>Beware of the Dog</h1>
      <p class="subtitle">Game Setup</p>
    </header>

    <main class="setup-shell">
      <section class="setup-card">
        <form class="setup-form" onsubmit="return false;">
          <div class="form-row">
            <label for="away">Away Team</label>
            <input id="away" placeholder="Away Team" />
          </div>

          <div class="form-row">
            <label for="home">Home Team</label>
            <input id="home" placeholder="Home Team" />
          </div>

          <div class="form-row">
            <label for="mode">Mode</label>
            <select id="mode">
              <option value="HOUSE">House</option>
              <option value="VS">VS</option>
            </select>
          </div>

          <div class="form-row">
            <label for="player1">Player 1 Name</label>
            <input id="player1" placeholder="Player 1" />
          </div>

          <div class="form-row">
            <label for="house">House / Player 2 Name</label>
            <input id="house" placeholder="House or Player 2" />
          </div>

          <div class="form-row">
            <label for="ante">Ante</label>
            <input id="ante" placeholder="e.g., $5 / chores / push-ups" />
          </div>

          <div class="form-actions">
            <button id="startBtn" type="button">Start Game</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
