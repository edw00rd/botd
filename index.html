<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beware of the Dog - Setup</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      label { display: block; margin-top: 8px; }
      input, select { padding: 4px; margin-top: 4px; width: 200px; }
      button { margin-top: 12px; padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>Beware of the Dog - Setup</h1>
    <label for="away">Away Team:</label>
    <input id="away" placeholder="Away Team">

    <label for="home">Home Team:</label>
    <input id="home" placeholder="Home Team">

    <label for="mode">Mode:</label>
    <select id="mode">
        <option value="HOUSE">House</option>
        <option value="VS">VS</option>
    </select>

    <label for="player1">Player 1 Name:</label>
    <input id="player1" placeholder="Player 1">

    <label for="house">House/Player 2 Name:</label>
    <input id="house" placeholder="House or Player 2">

    <button id="startBtn">Start Game</button>

    <script src="app.js"></script>
</body>
</html>
